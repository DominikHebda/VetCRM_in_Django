        breed:
          type: string
          nullable: true
          maxLength: 100
        birth_date:
          type: string
          format: date
          nullable: true
        chip_number:
          type: string
          nullable: true
          maxLength: 50
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        owner:
          type: integer
      required:
      - created_at
      - id
      - name
      - owner
      - species
      - updated_at
