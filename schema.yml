  /api/visits/:
    get:
      operationId: visits_list
      description: Manage veterinary visits.
      summary: Manage veterinary visits
      parameters:
      - in: query
        name: animal
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
