          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        diagnosis:
          type: string
        treatment:
          type: string
        recommendations:
          type: string
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        temperature:
