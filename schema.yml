      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - CANCELLED
          - COMPLETED
          - SCHEDULED
        description: |-
          * `SCHEDULED` - Scheduled
          * `COMPLETED` - Completed
          * `CANCELLED` - Cancelled
      - in: query
        name: veterinarian
        schema:
          type: integer
      tags:
      - Visits
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
