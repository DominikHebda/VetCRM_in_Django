openapi: 3.0.3
info:
  title: VetCRM API
  version: 1.0.0
  description: REST API for the Veterinary Clinic Management System
paths:
  /api/animals/:
    get:
      operationId: animals_list
      description: CRUD operations for veterinary patients.
      summary: Manage animals
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: owner
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: species
        schema:
          type: string
          enum:
          - cat
          - dog
          - other
        description: |-
          * `dog` - Dog
          * `cat` - Cat
          * `other` - Other
      tags:
      - Animals
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnimalList'
          description: ''
    post:
      operationId: animals_create
      description: CRUD operations for veterinary patients.
      summary: Manage animals
      tags:
      - Animals
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Animal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Animal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Animal'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animal'
          description: ''
