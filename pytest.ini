[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts =
    --strict-config
    --strict-markers
    --reuse-db
    --cov
    --cov-report=term-missing
    --cov-report=html
markers =
    unit: Fast isolated unit tests
    integration: Tests involving multiple application components
    api: REST API tests
    permissions: Authentication and authorization tests